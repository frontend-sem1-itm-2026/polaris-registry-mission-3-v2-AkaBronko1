<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro POLARIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="espacio-fondo text-white pt-5">
    <canvas id="lienzoEstrellas"></canvas>

    <div class="contenido-frente">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-espacial fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold texto-brillo" href="index.html">POLARIS Registry</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Menu de navegacion">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="registro.html">Registro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <section class="py-5 mt-4">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        <div class="card card-espacio p-4">
                            <h1 class="text-center mb-4 texto-brillo">Registro de Miembros POLARIS</h1>

                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Correo electronico</label>
                                    <input type="email" class="form-control">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Proyecto de interes</label>
                                    <select class="form-select">
                                        <option>PolariX</option>
                                        <option>Mentes en Orbita</option>
                                        <option>Hydronautas</option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-outline-light w-100 btn-lg">Enviar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
